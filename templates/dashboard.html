<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📊 Meeting Notes Dashboard</h1>
<a href="/home"><button>⬅ Back</button></a>
<a href="/logout"><button>Logout</button></a>

<hr>

{% if meetings %}
    {% for meeting in meetings %}
        <div class="container">
            <h3>👤 User: {{ meeting.user }}</h3>
            <h3>📝 Full Text:</h3>
            <p>{{ meeting.text }}</p>
            <h3>📌 Summary:</h3>
            <p>{{ meeting.summary }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>No meetings recorded yet.</p>
{% endif %}

</body>
</html>
